name: Daily Thai Stock Scan

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-thai-stock-scan.yml"
  schedule:
    # 18:35 Asia/Bangkok (UTC+7) = 11:35 UTC, every day.
    - cron: "35 11 * * *"
    # Heartbeat: run every 15 minutes, but the job will no-op unless within the send window.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mock_now_hhmm:
        description: "Optional test time in Asia/Bangkok HHMM (e.g. 1410)"
        required: false
        default: ""

concurrency:
  group: daily-thai-stock-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check send window (Asia/Bangkok)
        id: window
        shell: bash
        run: |
          event="${GITHUB_EVENT_NAME:-}"
          mock_now="${{ github.event.inputs.mock_now_hhmm }}"
          if [ "$event" = "workflow_dispatch" ]; then
            if [ -n "$mock_now" ]; then
              if [[ "$mock_now" =~ ^[0-2][0-9][0-5][0-9]$ ]]; then
                now="$mock_now"
                echo "Manual dispatch test mode using mock_now_hhmm=$now"
              else
                echo "Invalid mock_now_hhmm: '$mock_now' (expected HHMM, e.g. 1410)"
                exit 1
              fi
            else
              now="$(TZ=Asia/Bangkok date +%H%M)"
              echo "Manual dispatch without mock time; now=$now"
            fi
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: bypass time window."
            exit 0
          fi
          now="$(TZ=Asia/Bangkok date +%H%M)"
          # Send window: 18:30–19:00 Asia/Bangkok (tolerate cron delays).
          if [ "$now" -ge 1830 ] && [ "$now" -le 1900 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Within send window ($now)."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Outside send window ($now)."
          fi

      - name: Checkout
        if: steps.window.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.window.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.window.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run Thai stock screener
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/thai_early_trend.py \
            --csv thai_analyze_all.csv \
            --passing-csv thai_analyze_passing.csv

      - name: Run Thai sector rotation
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/thai_sector_rotation.py \
            --stock-csv thai_analyze_all.csv \
            --csv thai_sector_rotation.csv

      - name: Generate Thai summary
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/thai_generate_report.py \
            --stock-csv thai_analyze_all.csv \
            --passing-csv thai_analyze_passing.csv \
            --sector-csv thai_sector_rotation.csv \
            --output thai_summary.txt \
            --top 10

      - name: Validate Telegram secrets
        if: steps.window.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID in repository secrets."
            exit 1
          fi

      - name: Send Telegram summary
        if: steps.window.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/thai_generate_report.py \
            --stock-csv thai_analyze_all.csv \
            --passing-csv thai_analyze_passing.csv \
            --sector-csv thai_sector_rotation.csv \
            --output thai_summary.txt \
            --top 10 \
            --telegram \
            --telegram-csv thai_analyze_all.csv \
            --telegram-csv thai_sector_rotation.csv

      - name: Upload results
        if: steps.window.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: thai-stock-scan-results
          path: |
            thai_analyze_all.csv
            thai_analyze_passing.csv
            thai_sector_rotation.csv
            thai_summary.txt
