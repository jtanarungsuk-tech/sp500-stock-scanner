name: Daily Thai Stock Scan
# E2E trigger marker: 2026-05-24

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-thai-stock-scan.yml"
  schedule:
    # 07:32 America/New_York every day.
    # DST-safe schedules (UTC):
    # - EDT (UTC-4) -> 11:32 UTC
    # - EST (UTC-5) -> 12:32 UTC
    - cron: "32 11 * * *"
    - cron: "32 12 * * *"
  workflow_dispatch:
    inputs:
      mock_now_hhmm:
        description: "Optional test time in Asia/Bangkok HHMM (e.g. 1410)"
        required: false
        default: ""

concurrency:
  group: daily-thai-stock-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check send window (Asia/Bangkok)
        id: window
        shell: bash
        run: |
          event="${GITHUB_EVENT_NAME:-}"
          mock_now="${{ github.event.inputs.mock_now_hhmm }}"
          target_ny="0732"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "New York now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S America/New_York')"
          echo "Bangkok now: $(TZ=Asia/Bangkok date '+%Y-%m-%d %H:%M:%S Asia/Bangkok')"
          if [ "$event" = "workflow_dispatch" ] || [ "$event" = "push" ]; then
            if [ -n "$mock_now" ]; then
              if [[ "$mock_now" =~ ^[0-2][0-9][0-5][0-9]$ ]]; then
                now="$mock_now"
                echo "Manual dispatch test mode using mock_now_hhmm=$now"
              else
                echo "Invalid mock_now_hhmm: '$mock_now' (expected HHMM, e.g. 0732)"
                exit 1
              fi
            fi
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$event" = "schedule" ]; then
            now_ny="$(TZ=America/New_York date +%H%M)"
            if [ "$now_ny" = "$target_ny" ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Skip schedule run at NY $now_ny, target $target_ny"
            fi
            exit 0
          fi
          echo "should_run=false" >> "$GITHUB_OUTPUT"
          echo "Unsupported event: $event"

      - name: Checkout
        if: steps.window.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.window.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.window.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run Thai stock screener
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/thai_early_trend.py \
            --csv thai_analyze_all.csv \
            --passing-csv thai_analyze_passing.csv

      - name: Run Thai sector rotation
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/thai_sector_rotation.py \
            --stock-csv thai_analyze_all.csv \
            --csv thai_sector_rotation.csv

      - name: Generate Thai summary
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/thai_generate_report.py \
            --stock-csv thai_analyze_all.csv \
            --passing-csv thai_analyze_passing.csv \
            --sector-csv thai_sector_rotation.csv \
            --output thai_summary.txt \
            --top 10

      - name: Validate Telegram secrets
        if: steps.window.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID in repository secrets."
            exit 1
          fi

      - name: Send Telegram summary
        if: steps.window.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/thai_generate_report.py \
            --stock-csv thai_analyze_all.csv \
            --passing-csv thai_analyze_passing.csv \
            --sector-csv thai_sector_rotation.csv \
            --output thai_summary.txt \
            --top 10 \
            --telegram \
            --telegram-csv thai_analyze_all.csv \
            --telegram-csv thai_sector_rotation.csv

      - name: Upload results
        if: steps.window.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: thai-stock-scan-results
          path: |
            thai_analyze_all.csv
            thai_analyze_passing.csv
            thai_sector_rotation.csv
            thai_summary.txt
