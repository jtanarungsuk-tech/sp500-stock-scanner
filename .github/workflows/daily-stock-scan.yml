name: Daily S&P 500 Stock Scan

on:
  schedule:
    # 07:35 Asia/Bangkok (UTC+7) = 00:35 UTC, every day.
    - cron: "35 0 * * *"
    # Heartbeat: run every 15 minutes, but the job will no-op unless within the send window.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      mock_now_hhmm:
        description: "Optional test time in Asia/Bangkok HHMM (e.g. 1410)"
        required: false
        default: ""

concurrency:
  group: daily-sp500-stock-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check send window (Asia/Bangkok)
        id: window
        shell: bash
        run: |
          event="${GITHUB_EVENT_NAME:-}"
          mock_now="${{ github.event.inputs.mock_now_hhmm }}"
          if [ "$event" = "workflow_dispatch" ]; then
            if [ -n "$mock_now" ]; then
              if [[ "$mock_now" =~ ^[0-2][0-9][0-5][0-9]$ ]]; then
                now="$mock_now"
                echo "Manual dispatch test mode using mock_now_hhmm=$now"
              else
                echo "Invalid mock_now_hhmm: '$mock_now' (expected HHMM, e.g. 1410)"
                exit 1
              fi
            else
              now="$(TZ=Asia/Bangkok date +%H%M)"
              echo "Manual dispatch without mock time; now=$now"
            fi
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch: bypass time window."
            exit 0
          fi
          now="$(TZ=Asia/Bangkok date +%H%M)"
          # Send window: 07:30–08:00 Asia/Bangkok (tolerate cron delays).
          if [ "$now" -ge 0730 ] && [ "$now" -le 0800 ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Within send window ($now)."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Outside send window ($now)."
          fi

      - name: Checkout
        if: steps.window.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.window.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.window.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run stock screener
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/sp500_early_trend.py \
            --csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv

      - name: Run sector rotation
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/sector_rotation.py \
            --stock-csv analyze_stocks_all.csv \
            --csv sector_rotation.csv

      - name: Generate summary
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/generate_report.py \
            --stock-csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv \
            --sector-csv sector_rotation.csv \
            --output summary.txt \
            --top 10

      - name: Send Telegram summary
        if: steps.window.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -n "${TELEGRAM_BOT_TOKEN:-}" ] && [ -n "${TELEGRAM_CHAT_ID:-}" ]; then
            python scripts/generate_report.py \
              --stock-csv analyze_stocks_all.csv \
              --passing-csv analyze_stocks_passing.csv \
              --sector-csv sector_rotation.csv \
              --output summary.txt \
              --top 10 \
              --telegram \
              --telegram-csv analyze_stocks_all.csv \
              --telegram-csv sector_rotation.csv
          else
            echo "TELEGRAM_BOT_TOKEN/TELEGRAM_CHAT_ID missing; skip Telegram send."
          fi

      - name: Upload results
        if: steps.window.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stock-scan-results
          path: |
            analyze_stocks_all.csv
            analyze_stocks_passing.csv
            sector_rotation.csv
            summary.txt
