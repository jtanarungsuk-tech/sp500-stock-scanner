name: Daily S&P 500 Stock Scan

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/daily-stock-scan.yml"

  schedule:
    # 20:35 America/New_York every day.
    # DST-safe schedules (UTC):
    # - EDT (UTC-4) -> 00:35 UTC
    # - EST (UTC-5) -> 01:35 UTC
    - cron: "35 0 * * *"
    - cron: "35 1 * * *"

  workflow_dispatch:
    inputs:
      mock_now_hhmm:
        description: "Optional test time in Asia/Bangkok HHMM (e.g. 0815)"
        required: false
        default: ""

concurrency:
  group: daily-sp500-stock-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check run context and show time
        id: window
        shell: bash
        run: |
          event="${GITHUB_EVENT_NAME:-}"
          mock_now="${{ github.event.inputs.mock_now_hhmm }}"
          target_ny="2035"

          echo "Event: $event"
          echo "UTC now: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Bangkok now: $(TZ=Asia/Bangkok date '+%Y-%m-%d %H:%M:%S Asia/Bangkok')"
          echo "New York now: $(TZ=America/New_York date '+%Y-%m-%d %H:%M:%S America/New_York')"

          if [ "$event" = "workflow_dispatch" ] || [ "$event" = "push" ]; then
            if [ -n "$mock_now" ]; then
              if [[ "$mock_now" =~ ^[0-2][0-9][0-5][0-9]$ ]]; then
                echo "Manual dispatch test mode using mock_now_hhmm=$mock_now"
              else
                echo "Invalid mock_now_hhmm: '$mock_now' (expected HHMM, e.g. 2035)"
                exit 1
              fi
            fi
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$event" = "schedule" ]; then
            now_ny="$(TZ=America/New_York date +%H%M)"
            if [ "$now_ny" = "$target_ny" ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Skip schedule run at NY $now_ny, target $target_ny"
            fi
            exit 0
          fi

          echo "should_run=false" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.window.outputs.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.window.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.window.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run stock screener
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/sp500_early_trend.py \
            --csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv

      - name: Run sector rotation
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/sector_rotation.py \
            --stock-csv analyze_stocks_all.csv \
            --csv sector_rotation.csv

      - name: Generate summary
        if: steps.window.outputs.should_run == 'true'
        run: |
          python scripts/generate_report.py \
            --stock-csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv \
            --sector-csv sector_rotation.csv \
            --output summary.txt \
            --top 10

      - name: Validate Telegram secrets
        if: steps.window.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID in repository secrets."
            exit 1
          fi

      - name: Send Telegram summary
        if: steps.window.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/generate_report.py \
            --stock-csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv \
            --sector-csv sector_rotation.csv \
            --output summary.txt \
            --top 10 \
            --telegram \
            --telegram-csv analyze_stocks_all.csv \
            --telegram-csv sector_rotation.csv

      - name: Upload results
        if: steps.window.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stock-scan-results
          path: |
            analyze_stocks_all.csv
            analyze_stocks_passing.csv
            sector_rotation.csv
            summary.txt
