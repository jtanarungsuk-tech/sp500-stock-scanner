name: Daily S&P 500 Stock Scan

on:
  schedule:
    # Start at 06:45 Asia/Bangkok, then wait until 07:00 before scanning.
    # This is 23:45 UTC, Monday-Friday.
    - cron: "45 23 * * 1-5"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait until 07:00 Bangkok
        if: ${{ github.event_name == 'schedule' }}
        run: |
          now=$(TZ=Asia/Bangkok date +%s)
          target=$(TZ=Asia/Bangkok date -d "$(TZ=Asia/Bangkok date +%F) 07:00:00" +%s)
          if [ "$now" -lt "$target" ]; then
            sleep $((target - now))
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock screener
        run: |
          python scripts/sp500_early_trend.py \
            --csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv

      - name: Run sector rotation
        run: |
          python scripts/sector_rotation.py \
            --stock-csv analyze_stocks_all.csv \
            --csv sector_rotation.csv

      - name: Generate summary
        run: |
          python scripts/generate_report.py \
            --stock-csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv \
            --sector-csv sector_rotation.csv \
            --output summary.txt \
            --top 30

      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/generate_report.py \
            --stock-csv analyze_stocks_all.csv \
            --passing-csv analyze_stocks_passing.csv \
            --sector-csv sector_rotation.csv \
            --output summary.txt \
            --top 30 \
            --telegram \
            --telegram-csv analyze_stocks_all.csv \
            --telegram-csv sector_rotation.csv

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: stock-scan-results
          path: |
            analyze_stocks_all.csv
            analyze_stocks_passing.csv
            sector_rotation.csv
            summary.txt
